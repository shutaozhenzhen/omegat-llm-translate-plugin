name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Download OmegaT JAR
        run: |
          mkdir -p ../omegat/build/libs
          curl -sL -o /tmp/omegat.zip \
            "https://sourceforge.net/projects/omegat/files/OmegaT%20-%20Standard/OmegaT%206.0.1/OmegaT_6.0.1_Without_JRE.zip/download"
          unzip -j /tmp/omegat.zip "OmegaT_6.0.1_Without_JRE/lib/OmegaT.jar" -d ../omegat/build/libs/

      - name: Build with Gradle
        run: ./gradlew fatJar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omegat-llm-translate-plugin
          path: build/libs/*.jar
